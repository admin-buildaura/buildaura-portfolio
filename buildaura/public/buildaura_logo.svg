<svg width="600" height="320" viewBox="0 0 600 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>BuildAura Logo</title>
  <desc>BuildAura company logo featuring a geometric building mark with aura rings and bold modern wordmark</desc>

  <defs>
    <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#EF9F27" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#EF9F27" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EF9F27" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FAC775"/>
      <stop offset="100%" stop-color="#BA7517"/>
    </linearGradient>
    <linearGradient id="darkBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a1610"/>
      <stop offset="100%" stop-color="#0d0c09"/>
    </linearGradient>
  </defs>

  <!-- ── ICON MARK ── -->
  <g transform="translate(96, 160)">
    <!-- Aura rings -->
    <circle cx="0" cy="0" r="80" fill="url(#auraGrad)" opacity="0.5"/>
    <circle cx="0" cy="0" r="62" fill="none" stroke="#EF9F27" stroke-width="0.8" opacity="0.25"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#EF9F27" stroke-width="0.6" opacity="0.35"/>

    <!-- Icon background -->
    <rect x="-40" y="-42" width="80" height="80" rx="15" fill="url(#darkBg)"/>

    <!-- Main tower -->
    <rect x="-17" y="-30" width="34" height="52" rx="2" fill="url(#iconGrad)"/>
    <!-- Tower windows -->
    <rect x="-12" y="-24" width="9"  height="9"  rx="1.5" fill="#0d0c09" opacity="0.7"/>
    <rect x="3"   y="-24" width="9"  height="9"  rx="1.5" fill="#0d0c09" opacity="0.7"/>
    <rect x="-12" y="-10" width="9"  height="9"  rx="1.5" fill="#0d0c09" opacity="0.7"/>
    <rect x="3"   y="-10" width="9"  height="9"  rx="1.5" fill="#0d0c09" opacity="0.7"/>

    <!-- Left wing -->
    <rect x="-32" y="-15" width="17" height="37" rx="2" fill="#BA7517" opacity="0.85"/>
    <rect x="-28" y="-9"  width="7"  height="7"  rx="1" fill="#0d0c09" opacity="0.6"/>
    <rect x="-28" y="4"   width="7"  height="7"  rx="1" fill="#0d0c09" opacity="0.6"/>

    <!-- Right wing -->
    <rect x="15"  y="-15" width="17" height="37" rx="2" fill="#BA7517" opacity="0.85"/>
    <rect x="21"  y="-9"  width="7"  height="7"  rx="1" fill="#0d0c09" opacity="0.6"/>
    <rect x="21"  y="4"   width="7"  height="7"  rx="1" fill="#0d0c09" opacity="0.6"/>

    <!-- Ground bar -->
    <rect x="-32" y="22" width="64" height="5" rx="2" fill="#EF9F27" opacity="0.9"/>

    <!-- Crown accent -->
    <rect x="-4"  y="-34" width="8" height="6" rx="1.5" fill="#FAC775"/>
    <rect x="-10" y="-31" width="6" height="4" rx="1"   fill="#FAC775" opacity="0.6"/>
    <rect x="4"   y="-31" width="6" height="4" rx="1"   fill="#FAC775" opacity="0.6"/>

    <!-- Aura arcs -->
    <path d="M -46 -4 Q -50 -66, 0 -72 Q 50 -66, 46 -4"
          fill="none" stroke="#EF9F27" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
    <path d="M -34 -4 Q -36 -54, 0 -58 Q 36 -54, 34 -4"
          fill="none" stroke="#FAC775" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- ── WORDMARK ── -->
  <text x="178" y="148"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50" font-weight="700" letter-spacing="-1"
    fill="#1C1A14">build</text>

  <text x="315" y="148"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50" font-weight="700" letter-spacing="-1"
    fill="#BA7517">aura</text>

  <!-- Tagline -->
  <text x="178" y="173"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12" font-weight="400" letter-spacing="4"
    fill="#888780">BUILD BEYOND ORDINARY</text>

  <!-- Rule -->
  <line x1="178" y1="182" x2="460" y2="182" stroke="#EF9F27" stroke-width="1" opacity="0.5"/>
</svg>
